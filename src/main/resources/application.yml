server:
  port: 8090

spring:
  profiles:
    active: dev
  # 数据库配置
  datasource:
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/restaurantsys?allowMultiQueries=true&useUnicode=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 国际化文件配置
  messages:
    basename: i18n.login
  # 配置上传图片大小
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# mybatis配置
mybatis-plus:
  # 数据表映射配置文件路径
  mapper-locations: classpath:mappers/*.xml
  # 配置日志
  configuration:
    #log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Log配置
logging:
  level:
    root: info
  pattern:
    console: "%d{yyyy-MM-dd} [%thread] %-5level %logger{50} - %msg%n"

# swagger配置
swagger:
  title: "项目接口说明"
  description: "餐饮管理系统"
  version: "1.0"
  author: "Zc, Yhx"

jwt:
  header: "token"

